<!<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6">
    <div id="loginPage" class="max-w-md mx-auto mt-20 p-8 glass rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-center gradient-text">دخول المؤسسات</h1>
        <input type="text" placeholder="اسم المستخدم" class="w-full p-3 mb-4 rounded bg-slate-800 border border-slate-700 outline-none focus:border-blue-500">
        <button onclick="showOTP()" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition-all">طلب رمز التحقق</button>
        
        <div id="otpSection" class="hidden mt-6 text-center">
            <p class="mb-2 text-sm text-slate-400">أدخل الرمز المرسل لجوالك (4 أرقام)</p>
            <div class="flex justify-center gap-2">
                <input type="text" maxlength="1" class="w-12 h-12 text-center bg-slate-800 border border-slate-700 rounded text-xl">
                <input type="text" maxlength="1" class="w-12 h-12 text-center bg-slate-800 border border-slate-700 rounded text-xl">
                <input type="text" maxlength="1" class="w-12 h-12 text-center bg-slate-800 border border-slate-700 rounded text-xl">
                <input type="text" maxlength="1" class="w-12 h-12 text-center bg-slate-800 border border-slate-700 rounded text-xl">
            </div>
            <button onclick="login()" class="mt-6 w-full bg-green-600 p-3 rounded-lg font-bold">دخول للنظام</button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold">لوحة إدارة المؤسسة</h2>
                <p class="text-slate-400">قيمة الاشتراك الشهري: <span class="text-green-400">1600 ريال</span></p>
            </div>
            <div class="glass p-3 rounded-xl text-center">
                <p class="text-xs uppercase">العمولة الحالية</p>
                <p class="text-xl font-bold text-blue-400">10%</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-2xl">
                <h3 class="text-lg font-bold mb-4">💰 المحرك المالي الذكي</h3>
                <input type="number" id="amt" placeholder="أدخل مبلغ العملية" class="w-full p-2 rounded bg-slate-900 border border-slate-700 mb-4">
                <div class="flex justify-between text-sm mb-2"><span>عمولة المنصة (10%):</span> <span id="fee" class="text-red-400">0</span></div>
                <div class="flex justify-between font-bold text-lg"><span>الصافي للمورد:</span> <span id="net" class="text-green-400">0</span></div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h3 class="text-lg font-bold mb-4">📸 توثيق وإدارة ميديا</h3>
                <p class="text-xs text-slate-400 mb-4">رفع سجلات تجارية + فيديوهات عرض (بحد أقصى 10 ثوانٍ)</p>
                <input type="file" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>
        </div>
    </div>

    <script>
        function showOTP() { document.getElementById('otpSection').classList.remove('hidden'); }
        function login() { 
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
        document.getElementById('amt').addEventListener('input', function(e){
            let val = e.target.value;
            document.getElementById('fee').innerText = (val * 0.1).toFixed(2) + " ريال";
            document.getElementById('net').innerText = (val * 0.9).toFixed(2) + " ريال";
        });
    </script>
</body>
</html>
